<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POST — Cadastrar Pessoa</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<header>
    <h1>📋 Sistema de Cadastro — CRUD</h1>
</header>

<nav>
    <a href="/" class="home">🏠 Início</a>
    <a href="/post/" class="post ativo">➕ POST</a>
    <a href="/get/" class="get">📄 GET</a>
    <a href="/put/" class="put">✏️ PUT</a>
    <a href="/delete/" class="del">🗑️ DELETE</a>
</nav>

<div class="container">
    <div class="card">
        <h2>
            ➕ Cadastrar Nova Pessoa
            <span class="badge badge-post">POST</span>
        </h2>

        <div class="form-grid">

            <div class="form-group">
                <label for="nome">Nome</label>
                <input type="text" id="nome" placeholder="Ex: João">
            </div>

            <div class="form-group">
                <label for="sobrenome">Sobrenome</label>
                <input type="text" id="sobrenome" placeholder="Ex: Silva">
            </div>

            <div class="form-group full">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="Ex: joao@email.com">
            </div>

            <div class="form-group">
                <label for="idade">Idade</label>
                <input type="number" id="idade" placeholder="Ex: 25" min="0" max="150">
            </div>

            <div class="form-group">
                <label for="telefone">Telefone</label>
                <input type="text" id="telefone" placeholder="Ex: (11) 99999-0000">
            </div>

            <div class="form-group">
                <label for="rg">RG</label>
                <input type="text" id="rg" placeholder="Ex: 12.345.678-9">
            </div>

            <div class="form-group">
                <label for="rua">Rua</label>
                <input type="text" id="rua" placeholder="Ex: Rua das Flores, 100">
            </div>

            <div class="form-group">
                <label for="bairro">Bairro</label>
                <input type="text" id="bairro" placeholder="Ex: Centro">
            </div>

            <div class="form-group">
                <label for="cidade">Cidade</label>
                <input type="text" id="cidade" placeholder="Ex: São Paulo">
            </div>

            <div class="form-group">
                <label for="estado">Estado</label>
                <input type="text" id="estado" placeholder="Ex: SP" maxlength="2">
            </div>

        </div>

        <div id="alerta" class="alerta"></div>

        <div class="btn-group">
            <button class="btn-post" onclick="cadastrarPessoa()">➕ Cadastrar</button>
            <button class="btn-limpar" onclick="limparFormulario()">🧹 Limpar</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
